<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Augmentation의 한계점</title>
</head>
<body>

<main style="
  width:1280px;
  height:720px;
  margin:0 auto;
  padding:36px 40px;
  box-sizing:border-box;
  font-family:'Arial','Malgun Gothic',sans-serif;
  background:#ffffff;
  color:#111;
  position:relative;
">

  <!-- TITLE -->
  <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
    <div style="width:7px; height:38px; background:#4f46e5; border-radius:4px;"></div>
    <h1 contenteditable="true" style="margin:0; font-size:32px; font-weight:800;">
      Augmentation의 한계점
    </h1>
  </div>

  <!-- TOP CONTENT -->
  <div style="
    display:flex;
    gap:24px;
    height:380px;
  ">

    <!-- LEFT -->
    <figure style="flex:1; background:#f8fafc; border-radius:18px; padding:16px; box-shadow:0 8px 24px rgba(0,0,0,0.08);">
      <div contenteditable="true" style="font-size:20px;font-weight:800;margin-bottom:10px;">
        데이터의 본질적 특징을 더 잘 포착하기 위한 변형
      </div>
      <div style="height:230px; display:flex; align-items:center; justify-content:center; background:#fff; border-radius:12px;">
        <img src="images/img2.png" style="width:100%; height:100%; object-fit:contain;" />
      </div>
      <figcaption contenteditable="true" style="margin-top:10px; font-size:14px; color:#444;">
        적절한 변형은 label을 유지하면서 핵심 특징을 강화해야 한다.
      </figcaption>
    </figure>

    <!-- RIGHT -->
    <figure style="flex:1; background:#f8fafc; border-radius:18px; padding:16px; box-shadow:0 8px 24px rgba(0,0,0,0.08);">
      <div contenteditable="true" style="font-size:20px;font-weight:800;margin-bottom:10px;">
        도메인별로 augmentation 전략이 달라짐
      </div>
      <div style="height:230px; display:flex; align-items:center; justify-content:center; background:#fff; border-radius:12px;">
        <img src="images/img4.png" style="width:100%; height:100%; object-fit:contain;" />
      </div>
      <figcaption contenteditable="true" style="margin-top:10px; font-size:14px; color:#444;">
        모든 변형은 도메인에 따라 다르게 적용되어야 한다.
      </figcaption>
    </figure>

  </div>

  <!-- BOTTOM CARDS -->
  <div style="display:flex; gap:16px; margin-top:16px;">

    <section style="flex:1;padding:16px;border-radius:12px;background:#f5f6ff;">
      <div style="font-size:20px;">⚠</div>
      <h3 contenteditable="true">Label 보존 문제</h3>
      <p contenteditable="true" style="font-size:14px;">
        변형으로 인해 label 의미가 바뀌면 학습이 왜곡됨  
        (예: 6 → 회전 → 9)
      </p>
    </section>

    <section style="flex:1;padding:16px;border-radius:12px;background:#f5f6ff;">
      <div style="font-size:20px;">🧠</div>
      <h3 contenteditable="true">사전 지식 필요</h3>
      <p contenteditable="true" style="font-size:14px;">
        적절한 변형 선택은 도메인 이해에 의존함
      </p>
    </section>

    <section style="flex:1;padding:16px;border-radius:12px;background:#f5f6ff;">
      <div style="font-size:20px;">⚙</div>
      <h3 contenteditable="true">최적 조건 탐색</h3>
      <p contenteditable="true" style="font-size:14px;">
        augmentation 강도와 종류를 찾기 어려움
      </p>
    </section>

  </div>

  <!-- Navigation -->
  <div style="
    position:absolute;
    bottom:20px;
    left:0;
    width:100%;
    padding:0 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  ">

    <a href="page_2.html"
       style="background:#d1d5db;color:#1f2937;padding:8px 16px;border-radius:8px;text-decoration:none;">
      이전
    </a>

    <div style="background:#6d28d9;color:white;padding:4px 12px;border-radius:999px;font-size:13px;">
      3 / 11
    </div>

    <a href="page_4.html"
       style="background:#2563eb;color:white;padding:8px 16px;border-radius:8px;text-decoration:none;">
      다음
    </a>

  </div>

</main>

</body>
</html>
