<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Augmentation의 한계점</title>
</head>
<body>
  <main style="
    width: 1280px;
    height: 720px;
    margin: 0 auto;
    padding: 36px 40px;
    box-sizing: border-box;
    font-family: 'Arial', 'Malgun Gothic', sans-serif;
    background: #ffffff;
    color: #111;
  ">
    
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:22px;">
      <div style="width:7px; height:38px; background:#4f46e5; border-radius:4px;"></div>
      <h1 contenteditable="true" style="margin:0; font-size:32px; font-weight:800;">
        Augmentation의 한계점
      </h1>
    </div>

    <div style="
      display:flex;
      gap:28px;
      height: calc(100% - 70px);
      align-items:stretch;
    ">
      
      <!-- 왼쪽 2/4 -->
      <figure style="
        flex:1;
        margin:0;
        display:flex;
        flex-direction:column;
        justify-content:flex-start;
        background:#f8fafc;
        border-radius:18px;
        padding:18px 18px 14px 18px;
        box-sizing:border-box;
        box-shadow:0 8px 24px rgba(0,0,0,0.08);
      ">
        <div contenteditable="true" style="
          font-size:22px;
          font-weight:800;
          margin-bottom:14px;
          line-height:1.3;
        ">
          데이터의 본질적 특징을 더 잘 포착하기 위한 변형
        </div>

        <div style="
          flex:1;
          display:flex;
          align-items:center;
          justify-content:center;
          overflow:hidden;
          border-radius:12px;
          background:#fff;
        ">
          <img
            src="images/img2.png"
            alt="augmentation example"
            style="
              width:100%;
              height:100%;
              object-fit:contain;
              display:block;
            "
          />
        </div>

        <figcaption contenteditable="true" style="
          margin-top:14px;
          font-size:15px;
          line-height:1.5;
          color:#444;
        ">
          적절한 변형은 원래 label을 유지하면서도 데이터의 핵심 특징을 더 잘 드러내도록 도와야 한다.
        </figcaption>
      </figure>

      <!-- 오른쪽 2/4 -->
      <figure style="
        flex:1;
        margin:0;
        display:flex;
        flex-direction:column;
        justify-content:flex-start;
        background:#f8fafc;
        border-radius:18px;
        padding:18px 18px 14px 18px;
        box-sizing:border-box;
        box-shadow:0 8px 24px rgba(0,0,0,0.08);
      ">
        <div contenteditable="true" style="
          font-size:22px;
          font-weight:800;
          margin-bottom:14px;
          line-height:1.3;
        ">
          도메인에 따라 적절한 Augmentation 종류와 강도는 달라짐
        </div>

        <div style="
          flex:1;
          display:flex;
          align-items:center;
          justify-content:center;
          overflow:hidden;
          border-radius:12px;
          background:#fff;
        ">
          <img
            src="images/img4.png"
            alt="domain dependent augmentation"
            style="
              width:100%;
              height:100%;
              object-fit:contain;
              display:block;
            "
          />
        </div>

        <figcaption contenteditable="true" style="
          margin-top:14px;
          font-size:15px;
          line-height:1.5;
          color:#444;
        ">
          회전, geometric transform, random erasing 등은 모든 데이터에 동일하게 적용할 수 없으며 도메인 지식이 필요하다.
        </figcaption>
      </figure>

    </div>
  </main>
  <main style="max-width:1200px;margin:auto;padding:40px;font-family:sans-serif;">

<!-- 하단 카드 -->
<div style="display:flex;gap:18px;">

<section style="flex:1;padding:18px;border-radius:12px;background:#f5f6ff;">
<div style="font-size:22px;">⚠</div>
<h3 contenteditable="true">Label 보존 문제</h3>
<p contenteditable="true">
변형에 의해 데이터의 Label 특성이 손실되면 안 됨  
(예: 6을 180° 회전하면 9가 됨)
</p>
</section>

<section style="flex:1;padding:18px;border-radius:12px;background:#f5f6ff;">
<div style="font-size:22px;">🧠</div>
<h3 contenteditable="true">사전 지식 필요</h3>
<p contenteditable="true">
적절한 변형 선택은 도메인 지식과 분석자의 판단에 의존.
</p>
</section>

<section style="flex:1;padding:18px;border-radius:12px;background:#f5f6ff;">
<div style="font-size:22px;">⚙</div>
<h3 contenteditable="true">최적 조건 탐색</h3>
<p contenteditable="true">
도메인마다 최적의 augmentation 강도와 종류를 찾기 어려움.
</p>
</section>

</div>

</main>
</body>
</html>
