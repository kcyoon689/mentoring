      height:56px;

      top:280px;
      font-size:120px;

    }

    .auto-sub{
      position:absolute;
      left:140px;
      top:420px;
      font-size:26px;
      color:#5d6b82;
    }

    /* ===== RIGHT TEXT ===== */
    .content{
      position:absolute;
      left:820px;
      right:72px;
      top:260px;
      bottom:120px;
    }

    .body-large{
      font-size:24px;
      line-height:1.6;
      margin-bottom:32px;
    }

    /* ===== NAV ===== */
    .nav{
      position:absolute;
      bottom:24px;
      left:0;
      width:100%;
      padding:0 72px;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .btn-prev{
      background:#d1d5db;
      color:#1f2937;
      padding:10px 18px;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
    }

    .btn-next{
      background:#2563eb;
      color:white;
      padding:10px 18px;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
    }

      </div>
