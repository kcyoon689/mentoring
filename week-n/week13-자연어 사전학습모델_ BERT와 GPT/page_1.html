<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>자연어 사전학습모델: BERT와 GPT</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script><style>
        body {width: 1280px; height: 720px; overflow: hidden; font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;}
        .slide {
            width: 1280px;
            height: 720px;
            position: relative;
            
        }
        .neural-network {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.15;
        }
        .node {
            position: absolute;
            border-radius: 50%;
            background-color: #A0D995;
            box-shadow: 0 0 15px rgba(160, 217, 149, 0.7);
        }
        .line {
            position: absolute;
            background-color: #A0D995;
            transform-origin: left center;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }
        .pulse {
            animation: pulse 3s infinite ease-in-out;
        }
    
html {
    overflow: hidden;
}</style>
</head>
<body>
<div class="slide bg-gradient-to-br from-gray-100 to-gray-200 flex flex-col items-center justify-center relative" style=" overflow: hidden;">
<!-- Neural network visualization -->
<div class="neural-network">
<!-- Nodes -->
<div class="node w-4 h-4 top-1/4 left-1/4 pulse"></div>
<div class="node w-5 h-5 top-1/3 left-1/2"></div>
<div class="node w-4 h-4 top-2/3 left-1/4"></div>
<div class="node w-5 h-5 top-1/2 left-3/4 pulse"></div>
<div class="node w-4 h-4 top-1/6 left-3/5"></div>
<div class="node w-5 h-5 top-5/6 left-1/3"></div>
<div class="node w-4 h-4 top-3/5 left-1/5"></div>
<div class="node w-5 h-5 top-1/5 left-2/3"></div>
<div class="node w-4 h-4 top-4/5 left-2/5"></div>
<!-- Lines -->
<div class="line h-0.5 w-1/3 top-1/4 left-1/4 transform rotate-12"></div>
<div class="line h-0.5 w-1/4 top-1/3 left-1/2 transform -rotate-15"></div>
<div class="line h-0.5 w-1/3 top-2/3 left-1/4 transform rotate-20"></div>
<div class="line h-0.5 w-1/4 top-1/2 left-3/4 transform -rotate-10"></div>
<div class="line h-0.5 w-1/3 top-1/6 left-3/5 transform rotate-30"></div>
<div class="line h-0.5 w-1/4 top-5/6 left-1/3 transform -rotate-25"></div>
<div class="line h-0.5 w-1/3 top-3/5 left-1/5 transform rotate-15"></div>
<div class="line h-0.5 w-1/4 top-1/5 left-2/3 transform -rotate-20"></div>
<div class="line h-0.5 w-1/3 top-4/5 left-2/5 transform rotate-10"></div>
</div>
<!-- Main content -->
<div class="z-10 text-center px-16 py-10 bg-white bg-opacity-80 rounded-xl shadow-xl border-l-4 border-green-400">
<h1 class="text-5xl font-bold text-gray-800 mb-6">자연어 사전학습모델</h1>
<div class="flex items-center justify-center space-x-8 mb-6">
<div class="text-center">
<span class="text-6xl font-bold text-green-500">BERT</span>
<p class="text-gray-600 mt-2">Bidirectional Encoder Representations from Transformers</p>
</div>
<div class="h-20 w-0.5 bg-gray-300"></div>
<div class="text-center">
<span class="text-6xl font-bold text-orange-500">GPT</span>
<p class="text-gray-600 mt-2">Generative Pre-trained Transformer</p>
</div>
</div>
<p class="text-xl text-gray-700 mt-8">원리, 구조, 발전 및 응용 분야의 심층적 분석</p>
</div>
<!-- Footer -->
<div class="absolute bottom-8 right-8 text-gray-600">
<p>2025-09-23</p>
</div>
<!-- Decorative elements -->
<div class="absolute top-8 left-8">
<i class="fas fa-brain text-5xl text-green-500 opacity-70"></i>
</div>
<div class="absolute bottom-8 left-8">
<i class="fas fa-comment-dots text-5xl text-orange-500 opacity-70"></i>
</div>
</div>

</body></html>
