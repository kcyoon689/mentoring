<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI 분야 최신 트렌드</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;family=Noto+Sans+KR:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
<script src="https://picture-search.skywork.ai/aippt/static/tailwindcss.com"></script><style>
        body {width: 1280px; height: 720px; font-family: 'Noto Sans KR', sans-serif;
            background-color: #F5F5F5;
            color: #333333;}
        .title {
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #E0F7FA 0%, #FFE0B2 100%);
        }
        .accent-line {
            background: linear-gradient(90deg, #00BCD4 0%, #FF9800 100%);
        }
        .hexagon {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
    </style>
</head>
<body>
<div class="w-[1280px] h-[720px] relative gradient-bg flex flex-col justify-center items-center">
<!-- Abstract geometric shapes for visual interest -->
<div class="absolute top-10 left-10 w-32 h-32 bg-white bg-opacity-20 rounded-full"></div>
<div class="absolute bottom-20 right-16 w-40 h-40 bg-white bg-opacity-10 hexagon"></div>
<div class="absolute top-1/4 right-1/4 w-24 h-24 bg-white bg-opacity-15 transform rotate-45"></div>
<!-- Main content container -->
<div class="z-10 text-center px-16 max-w-4xl">
<!-- Title -->
<h1 class="title text-5xl mb-6 text-gray-800">AI 분야 최신 트렌드</h1>
<!-- Accent line -->
<div class="accent-line h-1 w-32 mx-auto mb-6"></div>
<!-- Subtitle -->
<h2 class="text-3xl mb-10 text-gray-700">Attention-Free 모델과 LLM 산업 분석</h2>
<!-- Visual representation of the two main topics -->
<div class="flex justify-center gap-16 mb-12">
<div class="bg-white bg-opacity-70 rounded-lg p-5 shadow-lg w-64 h-32 flex flex-col justify-center items-center transform hover:scale-105 transition-transform">
<i class="fas fa-brain text-3xl text-blue-500 mb-3"></i>
<p class="text-xl font-medium">Attention-Free 모델</p>
</div>
<div class="bg-white bg-opacity-70 rounded-lg p-5 shadow-lg w-64 h-32 flex flex-col justify-center items-center transform hover:scale-105 transition-transform">
<i class="fas fa-chart-line text-3xl text-orange-500 mb-3"></i>
<p class="text-xl font-medium">LLM 산업의 비용·수익 구조</p>
</div>
</div>
<!-- Date -->
<p class="text-lg text-gray-600 mt-10">2025년 11월 26일</p>
</div>
<!-- Bottom decoration -->
<div class="absolute bottom-0 w-full h-2 accent-line"></div>
</div>

</body></html>
